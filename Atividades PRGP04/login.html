<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - PRG04</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body class="login-screen">
    <div class="login-card">
        <h2>Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" value="admin@prg04.com" required>
                <span id="emailError" class="error-msg">E-mail inválido</span>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" value="admin123" required>
                <span id="passError" class="error-msg">Mínimo 6 caracteres</span>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">Entrar</button>
        </form>
    </div>
    <script src="assets/js/login.js"></script>
</body>
</html>
